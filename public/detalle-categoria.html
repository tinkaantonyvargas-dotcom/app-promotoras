<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Detalle por categoría – Tinkaventas</title>
  <link rel="stylesheet" href="css/style-dash.css">
</head>
<body>
<div class="phone-shell">

  <!-- App Bar -->
  <header class="app-bar">
    <div class="app-bar__row">
      <button class="app-bar__back" onclick="history.back()" aria-label="Volver">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span class="app-bar__title" id="pageTitle">Detalle categoría</span>
    </div>
    <div class="app-bar__banner" id="updatedBanner">&nbsp;</div>
  </header>

  <!-- Body -->
  <main class="screen-body">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
    </div>
    <div id="content" style="display:none"></div>
  </main>

</div>

<script>
function clamp(v, min, max) { return Math.min(Math.max(v, min), max); }

// Los datos son hasta ayer, por lo que el % previsto usa el día anterior
function pctPrevisto() {
  const now     = new Date();
  const diasMes = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const diaAyer = now.getDate() - 1;
  return clamp((diaAyer / diasMes) * 100, 0, 100);
}

function statusClass(pct) {
  const previsto = pctPrevisto();
  if (previsto === 0) return 'green-bar';
  const ratio = (pct / previsto) * 100;
  if (ratio >= 100) return 'green-bar';
  if (ratio >= 90)  return 'yellow-bar';
  return 'red-bar';
}

function progressBar(pct) {
  const fill     = clamp(pct, 0, 100);
  const previsto = pctPrevisto();
  const cls      = statusClass(pct);
  return `
    <div class="progress-wrap ${cls}">
      <div class="progress-track">
        <div class="progress-fill" style="width:${fill}%"></div>
        <div class="progress-marker" style="left:${previsto}%"></div>
        <span class="progress-text">${pct.toFixed(2)}%</span>
      </div>
    </div>`;
}

function fmt(n) {
  return 'S/ ' + Number(n).toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderProducto(p) {
  const cls = statusClass(p.porcentaje);
  return `
    <div class="section">
      <div class="month-header">
        <div class="month-header__title">${p.producto}</div>
      </div>
      <div class="card card--${cls}">
        <div class="metrics-row">
          <div class="metric">
            <div class="metric__label">Venta neta</div>
            <div class="metric__value">${fmt(p.venta)}</div>
          </div>
          <div class="metric">
            <div class="metric__label">Cuota mensual</div>
            <div class="metric__value">${fmt(p.cuota)}</div>
          </div>
        </div>
        <hr class="divider">
        <div class="meta-row">
          <span class="meta-row__label">Avance de cuota</span>
          <span class="meta-row__amount">${p.porcentaje.toFixed(2)}%</span>
        </div>
        ${progressBar(p.porcentaje)}
      </div>
    </div>`;
}

function render(data, catCodigo) {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const ts  = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('updatedBanner').textContent = `Actualizado al ${ts}`;

  // Encontrar la categoría seleccionada
  const categoria = (data.categorias || []).find(c => c.codigo === catCodigo);

  if (!categoria) {
    document.getElementById('content').innerHTML =
      `<div class="error-msg">Categoría "${catCodigo}" no encontrada.</div>`;
    return;
  }

  document.getElementById('pageTitle').textContent = `Avance ${categoria.codigo}`;

  // Filtrar productos que pertenecen a esta categoría
  const productosFiltrados = (data.productos || []).filter(p =>
    categoria.productos_keys.includes(p.producto)
  );

  let html = `
    <div class="user-info">
      ${data.nombre_completo || `Cód. ${data.cod_promotora}`}
      &nbsp;·&nbsp; ${categoria.nombre}
    </div>`;

  if (productosFiltrados.length === 0) {
    html += '<div class="error-msg">No hay productos registrados para esta categoría.</div>';
  } else {
    for (const p of productosFiltrados) {
      html += renderProducto(p);
    }
  }

  html += '<div style="height:32px"></div>';
  document.getElementById('content').innerHTML = html;
}

window.addEventListener('DOMContentLoaded', async () => {
  const cod = localStorage.getItem('cod_promotora');
  if (!cod) { window.location.href = 'index.html'; return; }

  const params    = new URLSearchParams(window.location.search);
  const catCodigo = params.get('cat');

  if (!catCodigo) {
    window.location.href = 'avance-mensual.html';
    return;
  }

  const show = (data) => {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render(data, catCodigo);
  };

  // Usar datos cacheados si están disponibles
  const cached = sessionStorage.getItem('promotora_data');
  if (cached) { show(JSON.parse(cached)); return; }

  try {
    const response = await fetch(`/api/dashboard/${cod}`);
    const result   = await response.json();

    if (result.success) {
      sessionStorage.setItem('promotora_data', JSON.stringify(result.data));
      show(result.data);
    } else {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('content').innerHTML =
        `<div class="error-msg">${result.message || 'No se encontraron datos.'}</div>`;
    }
  } catch (err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('content').innerHTML =
      '<div class="error-msg">Error al conectar con el servidor.</div>';
  }
});
</script>
</body>
</html>
