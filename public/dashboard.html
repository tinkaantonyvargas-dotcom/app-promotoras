<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Reporte - Ventas</title>
    <link rel="stylesheet" href="css/style-dash.css">
</head>
<body class="dashboard-body">
    <header class="main-header">
        <h1>Mi Resumen</h1>
        <button id="logoutBtn" class="btn-logout">Salir</button>
    </header>

    <main class="container">
        <section class="info-header">
            <div class="badge-ranking">
                <span>Puesto</span>
                <strong id="rankValue">-</strong>
            </div>
            <div class="user-meta">
                <h2 id="userName">Cargando...</h2>
                <p>Formato: <span id="formatoValue">-</span></p>
                <p>Responsable: <span id="responsableValue">-</span></p>
            </div>
        </section>

        <section>
            <h3>Progreso por Producto</h3>
            <div id="productosContainer" class="grid-productos">
                </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
